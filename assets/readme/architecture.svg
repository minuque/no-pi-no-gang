<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">no-pi-no-gang production architecture</title>
  <desc id="desc">The single production path from CLI to Web, AgentHost, AgentPool, RuntimeAdapter, Pi SDK, and JSONL history.</desc>

  <rect width="1200" height="500" rx="24" fill="#0f0f0f"/>
  <path d="M56 38h1088" stroke="#007acc" stroke-width="2"/>
  <path d="M56 126h1088M56 350h1088" stroke="#303030" stroke-width="1" opacity="0.7"/>

  <g id="heading">
    <path fill="#007acc" fill-rule="evenodd" d="M58 63h26v18H76v9H67v9H58zm9 9v9h9v-9zM84 81h9v18h-9z"/>
    <text x="108" y="82" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="27" font-weight="700">The path is intentional</text>
    <text x="108" y="108" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16">One production architecture keeps runtime ownership, browser state, and durable history separate.</text>
  </g>

  <g id="production-path" transform="translate(56 160)">
    <g>
      <rect width="168" height="112" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="20" y="36" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700">CLI</text>
      <text x="20" y="64" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">supervise</text>
      <text x="20" y="87" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">health · signals</text>
    </g>
    <g transform="translate(215)">
      <rect width="192" height="112" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="20" y="36" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700">Web BFF</text>
      <text x="20" y="64" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">browser boundary</text>
      <text x="20" y="87" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">HTTP · SSE · files</text>
    </g>
    <g transform="translate(454)">
      <rect width="204" height="112" rx="12" fill="#1a1a1a" stroke="#007acc" stroke-width="1.5"/>
      <text x="20" y="36" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700">AgentHost</text>
      <text x="20" y="64" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">runtime owner</text>
      <text x="20" y="87" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">commands · events</text>
    </g>
    <g transform="translate(705)">
      <rect width="192" height="112" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="20" y="36" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700">RuntimeAdapter</text>
      <text x="20" y="64" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">runtime boundary</text>
      <text x="20" y="87" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">protocol translation</text>
    </g>
    <g transform="translate(944)">
      <rect width="160" height="112" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="20" y="36" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700">Pi SDK</text>
      <text x="20" y="64" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">agent runtime</text>
      <text x="20" y="87" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">no fork</text>
    </g>
    <path d="M168 56h47m-8-7 8 7-8 7M407 56h47m-8-7 8 7-8 7M658 56h47m-8-7 8 7-8 7M897 56h47m-8-7 8 7-8 7" fill="none" stroke="#007acc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g id="ownership" transform="translate(56 384)">
    <rect width="328" height="72" rx="10" fill="#141414" stroke="#303030"/>
    <text x="18" y="27" fill="#007acc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">AGENTPOOL</text>
    <text x="18" y="51" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">active runtimes · Turns · idle cleanup</text>
    <rect x="352" width="380" height="72" rx="10" fill="#141414" stroke="#303030"/>
    <text x="370" y="27" fill="#007acc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">RUNTIME EVENT STREAM</text>
    <text x="370" y="51" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Pi SDK → EventBus → SSE → Web projection</text>
    <rect x="752" width="392" height="72" rx="10" fill="#141414" stroke="#303030"/>
    <text x="770" y="27" fill="#007acc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700">SESSIONRECORD JSONL</text>
    <text x="770" y="51" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">durable source of truth · branches · history</text>
  </g>
</svg>
