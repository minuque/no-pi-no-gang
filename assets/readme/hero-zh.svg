<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">no-pi-no-gang：看见会话，掌控运行</title>
  <desc id="desc">展示本地 Pi Agent 工作台，以及 Web、AgentHost、Pi SDK 和 JSONL 的运行链路。</desc>

  <rect width="1200" height="400" rx="24" fill="#0f0f0f"/>
  <path d="M704 0v400M728 0v400M1008 0v400" stroke="#303030" stroke-width="1" opacity="0.6"/>
  <path d="M56 316h1120M56 336h1120" stroke="#303030" stroke-width="1" opacity="0.55"/>
  <path d="M56 36h1120" stroke="#007acc" stroke-width="2" opacity="0.9"/>

  <g id="identity">
    <path fill="#007acc" fill-rule="evenodd" d="M58 66h39v26H84v13H71v13H58zm13 13v13h13V79zM97 92h13v26H97z"/>
    <text x="126" y="86" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="700" letter-spacing="2">本地 PI AGENT 工作台</text>
    <text x="56" y="154" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="46" font-weight="750" letter-spacing="-1.5">NO PI NO GANG</text>
    <text x="56" y="204" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="30" font-weight="650">看见会话，掌控运行。</text>
    <text x="56" y="244" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18">浏览持久历史、跟踪实时 RuntimeEvent，</text>
    <text x="56" y="271" fill="#aaaaaa" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18">并在同一个本地浏览器界面中处理工作区文件。</text>
    <text x="56" y="366" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" letter-spacing="1.5">会话   ·   TURN   ·   分支   ·   工作区</text>
  </g>

  <g id="project-proof" transform="translate(760 57)">
    <text x="0" y="0" fill="#007acc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="1.5">一个控制面</text>
    <g transform="translate(0 27)">
      <rect width="176" height="76" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="18" y="30" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700">WEB</text>
      <text x="18" y="54" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">界面 + BFF</text>
    </g>
    <g transform="translate(224 27)">
      <rect width="184" height="76" rx="12" fill="#1a1a1a" stroke="#007acc" stroke-width="1.5"/>
      <text x="18" y="30" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700">AGENTHOST</text>
      <text x="18" y="54" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">运行时所有者</text>
    </g>
    <g transform="translate(224 147)">
      <rect width="184" height="76" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="18" y="30" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700">PI SDK</text>
      <text x="18" y="54" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">运行时适配</text>
    </g>
    <g transform="translate(0 147)">
      <rect width="176" height="76" rx="12" fill="#1a1a1a" stroke="#303030"/>
      <text x="18" y="30" fill="#f1f1f1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700">JSONL</text>
      <text x="18" y="54" fill="#aaaaaa" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">持久历史</text>
    </g>
    <path d="M176 65h44m-8-7 8 7-8 7M316 103v36m-7-8 7 8 7-8M224 185h-40m8-7-8 7 8 7M88 147V115" fill="none" stroke="#007acc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="177" y="116" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">HTTP + SSE</text>
    <text x="326" y="126" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">HOST API</text>
    <text x="112" y="137" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">历史</text>
    <text x="0" y="270" fill="#717171" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="1">观察 → 判断 → 继续</text>
