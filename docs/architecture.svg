<svg viewBox="0 0 1000 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrow-cyan-up" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#22d3ee" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="780" fill="#020617" />
  <rect width="1000" height="780" fill="url(#grid)" />

  <!-- ================================================================
       ARROWS — drawn first so they render behind component boxes
       Horizontal routing in gaps uses layered y-positions:
         y=175: upper gap down, y=185: upper gap up
         y=305: mid gap down, y=315: mid gap up
         y=490: Flow①, y=497: Flow②, y=504: File, y=511: Config
       ================================================================ -->

  <!-- Flow ① 历史读取 (amber): Sidebar → /api/sessions → session-reader → .jsonl -->
  <line x1="140" y1="127" x2="140" y2="175" stroke="#fbbf24" stroke-width="1.8"/>
  <line x1="140" y1="175" x2="120" y2="175" stroke="#fbbf24" stroke-width="1.8"/>
  <line x1="120" y1="175" x2="120" y2="212" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#arrow-amber)"/>
  <line x1="120" y1="267" x2="120" y2="305" stroke="#fbbf24" stroke-width="1.8"/>
  <line x1="120" y1="305" x2="190" y2="305" stroke="#fbbf24" stroke-width="1.8"/>
  <line x1="190" y1="305" x2="190" y2="343" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#arrow-amber)"/>
  <line x1="190" y1="378" x2="190" y2="490" stroke="#fbbf24" stroke-width="1.8"/>
  <line x1="190" y1="490" x2="160" y2="490" stroke="#fbbf24" stroke-width="1.8"/>
  <line x1="160" y1="490" x2="160" y2="533" stroke="#fbbf24" stroke-width="1.8" marker-end="url(#arrow-amber)"/>

  <!-- Flow ② 命令发送 (emerald): Chat → /api/agent → rpc-manager → AgentSession → .jsonl -->
  <line x1="370" y1="127" x2="370" y2="175" stroke="#34d399" stroke-width="1.8"/>
  <line x1="370" y1="175" x2="310" y2="175" stroke="#34d399" stroke-width="1.8"/>
  <line x1="310" y1="175" x2="310" y2="212" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <line x1="310" y1="267" x2="310" y2="305" stroke="#34d399" stroke-width="1.8"/>
  <line x1="310" y1="305" x2="490" y2="305" stroke="#34d399" stroke-width="1.8"/>
  <line x1="490" y1="305" x2="490" y2="343" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <line x1="490" y1="378" x2="490" y2="438" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>
  <line x1="380" y1="473" x2="380" y2="497" stroke="#34d399" stroke-width="1.8"/>
  <line x1="380" y1="497" x2="160" y2="497" stroke="#34d399" stroke-width="1.8"/>
  <line x1="160" y1="497" x2="160" y2="533" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrow-emerald)"/>

  <!-- Flow ③ 事件流 (cyan dashed): Chat ↔ /api/agent/[id]/events ↔ subscribe()
       Down path (y=175 / y=305 left track): subscribe request
       Up path   (y=185 / y=315 right track): SSE push back -->
  <line x1="370" y1="127" x2="370" y2="175" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="370" y1="175" x2="530" y2="175" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="530" y1="175" x2="530" y2="212" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)"/>
  <line x1="530" y1="267" x2="530" y2="305" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="530" y1="305" x2="820" y2="305" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="820" y1="305" x2="820" y2="438" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)"/>
  <!-- Up path -->
  <line x1="835" y1="438" x2="835" y2="315" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="835" y1="315" x2="550" y2="315" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="550" y1="315" x2="550" y2="267" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-cyan-up)"/>
  <line x1="550" y1="212" x2="550" y2="185" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="550" y1="185" x2="385" y2="185" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="385" y1="185" x2="385" y2="127" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-cyan-up)"/>

  <!-- File flow (slate): WorkspacePanel → /api/files → 工作目录 -->
  <line x1="600" y1="127" x2="600" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <line x1="600" y1="175" x2="690" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <line x1="690" y1="175" x2="690" y2="212" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <line x1="690" y1="267" x2="690" y2="504" stroke="#64748b" stroke-width="1.5"/>
  <line x1="690" y1="504" x2="810" y2="504" stroke="#64748b" stroke-width="1.5"/>
  <line x1="810" y1="504" x2="810" y2="533" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- Config flow (slate): ModelsConfig → /api/models-config → settings.json + models.json -->
  <line x1="830" y1="127" x2="830" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <line x1="830" y1="175" x2="880" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <line x1="880" y1="175" x2="880" y2="212" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <line x1="880" y1="267" x2="880" y2="511" stroke="#64748b" stroke-width="1.5"/>
  <line x1="880" y1="511" x2="380" y2="511" stroke="#64748b" stroke-width="1.5"/>
  <line x1="590" y1="511" x2="590" y2="533" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <line x1="380" y1="511" x2="380" y2="533" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- ================================================================
       LAYER 1: Browser UI (cyan)
       ================================================================ -->
  <rect x="15" y="40" width="970" height="120" rx="10" fill="rgba(8, 51, 68, 0.08)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="25" y="56" fill="#22d3ee" font-size="10" font-weight="600">Browser UI</text>

  <!-- Flow ① marker on SessionSidebar -->
  <circle cx="48" cy="85" r="7" fill="#fbbf24"/>
  <text x="48" y="88" fill="#020617" font-size="8" font-weight="700" text-anchor="middle">①</text>

  <!-- SessionSidebar -->
  <rect x="35" y="72" width="210" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="35" y="72" width="210" height="55" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="95" fill="white" font-size="11" font-weight="600" text-anchor="middle">SessionSidebar</text>
  <text x="150" y="114" fill="#94a3b8" font-size="9" text-anchor="middle">会话树 / 分支导航</text>

  <!-- Flow ②③ markers on ChatWindow -->
  <circle cx="278" cy="85" r="7" fill="#34d399"/>
  <text x="278" y="88" fill="#020617" font-size="8" font-weight="700" text-anchor="middle">②</text>
  <circle cx="293" cy="85" r="7" fill="#22d3ee"/>
  <text x="293" y="88" fill="#020617" font-size="8" font-weight="700" text-anchor="middle">③</text>

  <!-- ChatWindow -->
  <rect x="265" y="72" width="210" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="265" y="72" width="210" height="55" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="385" y="95" fill="white" font-size="11" font-weight="600" text-anchor="middle">ChatWindow</text>
  <text x="385" y="114" fill="#94a3b8" font-size="9" text-anchor="middle">对话 + 执行流 + 输入</text>

  <!-- WorkspacePanel -->
  <rect x="495" y="72" width="210" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="495" y="72" width="210" height="55" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="600" y="95" fill="white" font-size="11" font-weight="600" text-anchor="middle">WorkspacePanel</text>
  <text x="600" y="114" fill="#94a3b8" font-size="9" text-anchor="middle">文件树 / 预览</text>

  <!-- ModelsConfig -->
  <rect x="725" y="72" width="210" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="725" y="72" width="210" height="55" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="830" y="95" fill="white" font-size="11" font-weight="600" text-anchor="middle">ModelsConfig</text>
  <text x="830" y="114" fill="#94a3b8" font-size="9" text-anchor="middle">模型 / 偏好 / 技能</text>

  <!-- ================================================================
       LAYER 2: Next.js API (emerald)
       ================================================================ -->
  <rect x="15" y="190" width="970" height="105" rx="10" fill="rgba(6, 78, 59, 0.06)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="25" y="206" fill="#34d399" font-size="10" font-weight="600">Next.js API Routes</text>

  <rect x="35" y="222" width="170" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="35" y="222" width="170" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="120" y="245" fill="white" font-size="11" font-weight="600" text-anchor="middle">/api/sessions</text>
  <text x="120" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">历史读取 &amp; 分支</text>

  <rect x="225" y="222" width="170" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="225" y="222" width="170" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="310" y="245" fill="white" font-size="11" font-weight="600" text-anchor="middle">/api/agent</text>
  <text x="310" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">新建 / 发送 / Fork</text>

  <rect x="415" y="222" width="170" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="415" y="222" width="170" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="245" fill="white" font-size="11" font-weight="600" text-anchor="middle">/api/agent/:id/events</text>
  <text x="500" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">SSE 事件流</text>

  <rect x="605" y="222" width="170" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="605" y="222" width="170" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="690" y="245" fill="white" font-size="11" font-weight="600" text-anchor="middle">/api/files</text>
  <text x="690" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">工作目录读取</text>

  <rect x="795" y="222" width="170" height="55" rx="6" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="795" y="222" width="170" height="55" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="880" y="245" fill="white" font-size="11" font-weight="600" text-anchor="middle">/api/models-config</text>
  <text x="880" y="264" fill="#94a3b8" font-size="9" text-anchor="middle">模型读写 &amp; 测试</text>

  <!-- ================================================================
       LAYER 3: Core Modules
       ================================================================ -->
  <rect x="15" y="325" width="970" height="65" rx="10" fill="rgba(6, 78, 59, 0.04)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="25" y="341" fill="#34d399" font-size="10" font-weight="600">Core Modules (lib/)</text>

  <rect x="60" y="348" width="260" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="60" y="348" width="260" height="35" rx="5" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="190" y="370" fill="white" font-size="11" font-weight="600" text-anchor="middle">session-reader.ts</text>

  <rect x="360" y="348" width="260" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="360" y="348" width="260" height="35" rx="5" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="370" fill="white" font-size="11" font-weight="600" text-anchor="middle">rpc-manager.ts</text>

  <rect x="660" y="348" width="280" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="660" y="348" width="280" height="35" rx="5" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
  <text x="800" y="370" fill="white" font-size="11" font-weight="600" text-anchor="middle">normalize.ts</text>
  <text x="660" y="395" fill="#475569" font-size="8">（共享依赖：消息字段兼容）</text>

  <!-- ================================================================
       LAYER 4: AgentSession Runtime (orange)
       ================================================================ -->
  <rect x="15" y="420" width="970" height="65" rx="10" fill="rgba(251, 146, 60, 0.04)" stroke="#fb923c" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="25" y="436" fill="#fb923c" font-size="10" font-weight="600">AgentSession Runtime（进程内运行态）</text>

  <rect x="60" y="443" width="200" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="60" y="443" width="200" height="35" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="160" y="465" fill="white" font-size="11" font-weight="600" text-anchor="middle">prompt()</text>

  <rect x="280" y="443" width="200" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="280" y="443" width="200" height="35" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="380" y="465" fill="white" font-size="11" font-weight="600" text-anchor="middle">fork()</text>

  <rect x="500" y="443" width="200" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="500" y="443" width="200" height="35" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="600" y="465" fill="white" font-size="11" font-weight="600" text-anchor="middle">navigate()</text>

  <rect x="720" y="443" width="200" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="720" y="443" width="200" height="35" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="820" y="465" fill="white" font-size="11" font-weight="600" text-anchor="middle">subscribe()</text>

  <!-- ================================================================
       LAYER 5: Local Disk ~/.pi/agent/ (violet)
       ================================================================ -->
  <rect x="15" y="515" width="970" height="75" rx="10" fill="rgba(76, 29, 149, 0.06)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="25" y="531" fill="#a78bfa" font-size="10" font-weight="600">~/.pi/agent/ — 本地事实源</text>

  <rect x="60" y="543" width="200" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="60" y="543" width="200" height="35" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="160" y="564" fill="white" font-size="10" font-weight="600" text-anchor="middle">sessions/*.jsonl</text>

  <rect x="290" y="543" width="180" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="290" y="543" width="180" height="35" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="380" y="564" fill="white" font-size="10" font-weight="600" text-anchor="middle">settings.json</text>

  <rect x="500" y="543" width="180" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="500" y="543" width="180" height="35" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="590" y="564" fill="white" font-size="10" font-weight="600" text-anchor="middle">models.json</text>

  <rect x="710" y="543" width="200" height="35" rx="5" fill="#0f172a" stroke="#0f172a" stroke-width="1.5"/>
  <rect x="710" y="543" width="200" height="35" rx="5" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="564" fill="white" font-size="10" font-weight="600" text-anchor="middle">工作目录文件</text>

  <!-- ================================================================
       LEGEND
       ================================================================ -->
  <rect x="720" y="615" width="265" height="150" rx="8" fill="rgba(15, 23, 42, 0.8)" stroke="#1e293b" stroke-width="0.5"/>
  <text x="735" y="634" fill="white" font-size="10" font-weight="600">图例 Legend</text>

  <rect x="735" y="646" width="14" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="756" y="653" fill="#94a3b8" font-size="8">Browser UI / 前端</text>

  <rect x="735" y="660" width="14" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="756" y="667" fill="#94a3b8" font-size="8">API / Core / 后端</text>

  <rect x="735" y="674" width="14" height="8" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="756" y="681" fill="#94a3b8" font-size="8">AgentSession / 运行态</text>

  <rect x="735" y="688" width="14" height="8" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="756" y="695" fill="#94a3b8" font-size="8">Local Disk / 持久化</text>

  <line x1="735" y1="710" x2="749" y2="710" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="756" y="713" fill="#94a3b8" font-size="8">Flow ① 历史读取</text>

  <line x1="735" y1="724" x2="749" y2="724" stroke="#34d399" stroke-width="1.5"/>
  <text x="756" y="727" fill="#94a3b8" font-size="8">Flow ② 命令发送</text>

  <line x1="735" y1="738" x2="749" y2="738" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="756" y="741" fill="#94a3b8" font-size="8">Flow ③ SSE 事件流</text>

  <line x1="735" y1="752" x2="749" y2="752" stroke="#64748b" stroke-width="1.5"/>
  <text x="756" y="755" fill="#94a3b8" font-size="8">配置文件流</text>
</svg>
